{% extends 'base.html' %}
{% block title %}Category Form{% endblock %}

{% block content %}
<div class="back-btn-row">
    <a href="{% url 'admin_categories' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Categories</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{% if category %}Edit{% else %}Create{% endif %} Category</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4">{{ category.description }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Category</button>
    </form>
</div>
{% endblock %}
