{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="back-btn-row">
    <a href="{% url 'admin_users' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Users</a>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto; border-color: var(--danger);">
    <h2 style="color: var(--danger);">Force Password Reset</h2>
    <p>You are resetting the password for user: <strong>{{ user_obj.username }}</strong>.</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>New Password</label>
            <input type="text" name="password" class="form-control" placeholder="Enter new temporary password" required>
        </div>
        <button type="submit" class="btn btn-danger confirm-action" data-confirm="Are you sure you want to reset this user's password?" style="width: 100%;">Force Reset</button>
    </form>
</div>
{% endblock %}
