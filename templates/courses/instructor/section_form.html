{% extends 'courses/instructor/instructor_base.html' %}
{% block title %}Add Module{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{% url 'instructor_course_manage' course.id %}" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Back to Course Builder
    </a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="text-center" style="margin-top:0;">Add Module to <span style="color:var(--accent);">"{{ course.title }}"</span></h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Module Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g. Week 1: Introduction" required>
        </div>
        <div class="form-group">
            <label>Sequence Order</label>
            <input type="number" name="order" class="form-control" value="1" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Module</button>
    </form>
</div>
{% endblock %}
