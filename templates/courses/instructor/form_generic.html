{% extends 'courses/instructor/instructor_base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'instructor_course_manage' course.id %}" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Back to Course Builder
    </a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{{ title }}</h2>
    
    <form method="post" enctype="multipart/form-data" style="margin-top: 20px;">
        {% csrf_token %}
        
        {% if is_simple_post %}
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: 500; margin-bottom: 8px; display: block;">Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>
        {% else %}
            {{ form.as_p }}
        {% endif %}

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Save</button>
    </form>
</div>
{% endblock %}
