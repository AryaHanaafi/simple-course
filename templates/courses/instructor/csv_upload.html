{% extends 'courses/instructor/instructor_base.html' %}
{% block title %}Bulk CSV Upload{% endblock %}

{% block content %}
<div class="back-btn-row">
    <a href="{% url 'instructor_dashboard' %}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Bulk Enroll Students via CSV</h2>
    <p>Upload a CSV file without headers. Format: <code>email, first_name, last_name, username, password</code></p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>CSV File</label>
            <input type="file" name="csv_file" class="form-control" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Upload & Enroll</button>
    </form>
</div>
{% endblock %}
