<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="SwaggerUI" />
  <title>API Documentation - NextGen Pro</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  <style>
    body { margin: 0; padding: 0; background-color: #0f172a; color: white; }
    .swagger-ui .info .title { color: white; }
    .swagger-ui .info p { color: #cbd5e1; }
    .swagger-ui .opblock .opblock-summary-method { border-radius: 4px; }
    .swagger-ui .scheme-container { background: #1e293b; box-shadow: none; border-bottom: 1px solid #334155; }
    .swagger-ui .opblock-tag { color: #38bdf8; border-bottom: 1px solid #334155; }
    .swagger-ui .opblock .opblock-summary-operation-id, .swagger-ui .opblock .opblock-summary-path, .swagger-ui .opblock .opblock-summary-path__deprecated { color: #f8fafc; }
    .swagger-ui .opblock-description-wrapper p, .swagger-ui .opblock-external-docs-wrapper p, .swagger-ui .opblock-title_normal p { color: #cbd5e1; }
    .swagger-ui table thead tr td, .swagger-ui table thead tr th { color: #cbd5e1; border-bottom: 1px solid #334155; }
    .swagger-ui .parameter__name, .swagger-ui .parameter__type { color: #e2e8f0; }
    .swagger-ui .response-col_status, .swagger-ui .response-col_description { color: #e2e8f0; }
    .swagger-ui section h3 { color: #f8fafc; }
    .swagger-ui .btn { color: #0f172a; background: #38bdf8; border-color: #38bdf8; }
    .swagger-ui select { background: #334155; color: white; border: 1px solid #475569; }
    .swagger-ui input[type=text], .swagger-ui input[type=password], .swagger-ui input[type=search], .swagger-ui input[type=email], .swagger-ui input[type=file] { background: #334155; color: white; border: 1px solid #475569; }
    .swagger-ui .topbar { background-color: #0f172a; border-bottom: 1px solid #334155; }
  </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" crossorigin></script>
<script>
  window.onload = () => {
    window.ui = SwaggerUIBundle({
      url: '/static/swagger.json',
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: "BaseLayout",
    });
  };
</script>
</body>
</html>
